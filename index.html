<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aryan Srivastava | Portfolio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Spline Viewer -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.59/build/spline-viewer.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="presentation-wrapper">
        <div class="app-container">
            
            <!-- Top Navigation -->
            <nav class="navbar">
                <div class="logo">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    <span>Aryan.</span>
                </div>
                <div class="nav-links">
                    <a href="https://github.com/aryan29101" target="_blank">Work</a>
                    <a href="https://www.linkedin.com/in/aryan-srivastava-048b93344" target="_blank">About</a>
                    <a href="#">Services</a>
                    <a href="#">Products</a>
                </div>
                <div class="nav-contact">
                    <a href="#" class="nav-btn">Contact</a>
                </div>
            </nav>

            <!-- Center 3D Object -->
            <div class="center-stage">
                <div class="glow-orb"></div>
                <!-- Using your Spline scene centered -->
                <div class="spline-wrapper">
                    <spline-viewer url="https://app.spline.design/file/2d225387-f18a-4793-9b08-d5ad0273ac2f/scene.splinecode"></spline-viewer>
                </div>
            </div>

            <!-- Bottom Content -->
            <div class="bottom-section">
                <div class="left-text">
                    <h1>Building Cool<br>Data Experiences</h1>
                </div>
                
                <div class="right-content">
                    <p>BSc Data Science Student crafting intelligent narratives, modern web solutions, and predictive models.</p>
                    <div class="action-buttons">
                        <a href="Aryan_Resume.pdf" target="_blank" class="btn btn-outline">View Resume</a>
                        <a href="https://github.com/aryan29101" target="_blank" class="btn btn-primary">
                            GitHub
                            <div class="blue-dot"></div>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Subtle Grid Background Overlay -->
            <div class="bg-grid"></div>
        </div>
    </div>

    <script>
        // Subtle mouse move parallax for the inner container to make it feel premium
        const container = document.querySelector('.app-container');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            container.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
