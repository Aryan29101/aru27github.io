<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aryan Srivastava | Data Scientist Portfolio</title>
    <meta name="description" content="Portfolio of Aryan Srivastava, a BSc Data Science Student specializing in modern data solutions and 3D web experiences.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Spline Viewer -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.59/build/spline-viewer.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 3D Background -->
    <div class="spline-container">
        <spline-viewer url="https://app.spline.design/file/2d225387-f18a-4793-9b08-d5ad0273ac2f/scene.splinecode"></spline-viewer>
    </div>

    <!-- Main Content -->
    <main class="content-wrapper">
        <div class="glass-card">
            <header class="profile-header">
                <div class="avatar-container">
                    <spline-viewer url="https://app.spline.design/file/f7036495-2009-455a-83b6-2041ccb67a5b/scene.splinecode"></spline-viewer>
                </div>
                <div class="profile-badge">BSc Data Science</div>
                <h1 class="name">Aryan Srivastava</h1>
                <p class="tagline">Crafting data-driven narratives and immersive web experiences.</p>
            </header>

            <nav class="links-container">
                <a href="Aryan_Resume.pdf" target="_blank" class="nav-link primary">
                    <span class="icon">📄</span>
                    <span class="text">View Resume</span>
                </a>
                <div class="social-links">
                    <a href="https://github.com/aryan29101" target="_blank" class="nav-link secondary">
                        <span class="icon">💻</span>
                    </a>
                    <a href="https://www.linkedin.com/in/aryan-srivastava-048b93344" target="_blank" class="nav-link secondary">
                        <span class="icon">🔗</span>
                    </a>
                </div>
            </nav>

            <form class="contact-form">
                <h3 class="form-title">Send a Message</h3>
                <div class="input-group">
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Your Email" required>
                </div>
                <div class="input-group">
                    <textarea placeholder="Your Message" rows="3" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>

            <footer class="card-footer">
                <p>© 2024 Aryan Srivastava</p>
            </footer>
        </div>
    </main>

    <!-- Overlay for better contrast -->
    <div class="vignette"></div>

    <script>
        // 3D Parallax Tilt Effect for the Glass Card
        const card = document.querySelector('.glass-card');
        const wrapper = document.querySelector('.content-wrapper');

        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset on mouse leave
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body>
</html>
