<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Aryan Srivastava — CS Student & Data Science Specialist</title>
    <meta name="description" content="Portfolio of Aryan Srivastava — BSc Computer Science student specializing in Data Science. Python developer, problem solver, and aspiring data scientist.">
    <link rel="stylesheet" href="style.css"/>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.170.0/build/three.module.js" } }
    </script>
</head>
<body>
    <!-- Giulio-style Intro Overlay -->
    <div id="intro-overlay">
        <p class="intro-text">Initializing Portfolio</p>
        <div class="intro-name">Aryan Srivastava</div>
        <div class="intro-bar"><div class="intro-bar-fill"></div></div>
    </div>

    <div class="aurora-bg"></div>
    <canvas id="particles-canvas"></canvas>

    <nav class="nav" id="main-nav"></nav>

    <main class="hero">
        <!-- 3D Wireframe Sphere Background -->
        <div id="sphere-container" style="position:absolute;inset:0;z-index:0;pointer-events:none;"></div>
        <div class="hero-content">
            <div class="hero-badge reveal">
                <span class="badge badge-purple">
                    <span style="width:5px;height:5px;border-radius:50%;background:var(--primary-light);display:inline-block;animation:cursor-blink 1.5s infinite;"></span>
                    BSc CS — Data Science
                </span>
            </div>

            <h1 class="hero-name reveal reveal-delay-1">
                Hi, I'm<br/>
                <span class="gradient-text">Aryan Srivastava</span>
            </h1>

            <p class="hero-desc reveal reveal-delay-2">
                Computer Science student at Galgotias University, passionate about
                <span id="typed-text" style="color:var(--secondary);font-weight:500;"></span><span class="typed-cursor"></span>
            </p>

            <div class="hero-buttons reveal reveal-delay-3">
                <a href="missions.html" class="btn btn-primary glitch-hover">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M14 10l6.1-6.1M9 21H3v-6m0 6l6.1-6.1"/></svg>
                    View Projects
                </a>
                <a href="contact.html" class="btn btn-outline glitch-hover">
                    Get in Touch
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </a>
            </div>

            <!-- Quick Stats -->
            <div class="reveal reveal-delay-4" style="display:flex;gap:3rem;justify-content:center;margin-top:4rem;flex-wrap:wrap;">
                <div style="text-align:center;">
                    <div style="font-family:var(--font-display);font-size:2.2rem;font-weight:700;color:var(--primary-light);letter-spacing:-0.03em;">3+</div>
                    <div style="font-size:0.72rem;color:var(--text-muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.1em;margin-top:0.3rem;">Languages</div>
                </div>
                <div style="width:1px;background:var(--border);align-self:stretch;"></div>
                <div style="text-align:center;">
                    <div style="font-family:var(--font-display);font-size:2.2rem;font-weight:700;color:var(--secondary);letter-spacing:-0.03em;">2+</div>
                    <div style="font-size:0.72rem;color:var(--text-muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.1em;margin-top:0.3rem;">Projects</div>
                </div>
                <div style="width:1px;background:var(--border);align-self:stretch;"></div>
                <div style="text-align:center;">
                    <div style="font-family:var(--font-display);font-size:2.2rem;font-weight:700;color:var(--accent);letter-spacing:-0.03em;">1</div>
                    <div style="font-size:0.72rem;color:var(--text-muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.1em;margin-top:0.3rem;">Internship</div>
                </div>
            </div>
        </div>

        <div class="scroll-indicator">
            <span>Scroll</span>
            <div class="scroll-line"></div>
        </div>
    </main>

    <footer class="footer" id="main-footer"></footer>
    
    <script src="scripts/audio-system.js"></script>
    <script src="scripts/crt-core.js"></script>
    <script src="scripts/shared.js"></script>
    <script type="module">
        import { initSphere } from './scripts/3d-sphere.js';
        initSphere('sphere-container');
    </script>
    <script>
        typeText(document.getElementById('typed-text'), [
            'Data Science & Analytics',
            'Python Automation',
            'Algorithmic Problem Solving',
            'Building Real-World Projects'
        ]);
    </script>
</body>
</html>
