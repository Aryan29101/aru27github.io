<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Contact — Aryan Srivastava</title>
    <meta name="description" content="Get in touch with Aryan Srivastava — Email, phone, LinkedIn, and contact form.">
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="aurora-bg"></div>
    <canvas id="particles-canvas"></canvas>
    <nav class="nav" id="main-nav"></nav>

    <main class="section" style="padding-top:8rem;">
        <div class="reveal" style="text-align:center;margin-bottom:3rem;">
            <p class="section-label">// get in touch</p>
            <h1 class="section-title" style="margin-left:auto;margin-right:auto;">Let's Connect</h1>
            <p class="section-subtitle" style="margin:0.5rem auto 0;">Have a question, opportunity, or just want to say hello? I'd love to hear from you.</p>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:3rem;max-width:1000px;margin:0 auto;">
            <!-- Contact Info -->
            <div style="display:flex;flex-direction:column;gap:1.5rem;">
                <div class="glass reveal reveal-delay-1" data-tilt style="padding:1.5rem;display:flex;align-items:center;gap:1rem;">
                    <div style="width:48px;height:48px;border-radius:12px;background:rgba(124,58,237,0.15);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;">✉️</div>
                    <div>
                        <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.2rem;">Email</div>
                        <a href="mailto:aryansrivastava292005@gmail.com" style="color:var(--text);text-decoration:none;font-weight:500;font-size:0.9rem;">aryansrivastava292005@gmail.com</a>
                    </div>
                </div>

                <div class="glass reveal reveal-delay-2" data-tilt style="padding:1.5rem;display:flex;align-items:center;gap:1rem;">
                    <div style="width:48px;height:48px;border-radius:12px;background:rgba(6,182,212,0.15);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;">📱</div>
                    <div>
                        <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.2rem;">Phone</div>
                        <a href="tel:+918707566253" style="color:var(--text);text-decoration:none;font-weight:500;font-size:0.9rem;">+91 8707566253</a>
                    </div>
                </div>

                <div class="glass reveal reveal-delay-3" data-tilt style="padding:1.5rem;display:flex;align-items:center;gap:1rem;">
                    <div style="width:48px;height:48px;border-radius:12px;background:rgba(244,114,182,0.15);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;">📍</div>
                    <div>
                        <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.2rem;">Location</div>
                        <span style="color:var(--text);font-weight:500;font-size:0.9rem;">Greater Noida, Uttar Pradesh, India</span>
                    </div>
                </div>

                <!-- Social Row -->
                <div class="reveal reveal-delay-4" style="display:flex;gap:0.75rem;margin-top:0.5rem;">
                    <a href="https://linkedin.com/in/aryan-srivastava-048b93344" target="_blank" class="glass" style="flex:1;padding:1rem;text-align:center;text-decoration:none;color:var(--primary-light);font-size:0.85rem;font-weight:600;">LinkedIn</a>
                    <a href="https://github.com/Aryan29101" target="_blank" class="glass" style="flex:1;padding:1rem;text-align:center;text-decoration:none;color:var(--secondary);font-size:0.85rem;font-weight:600;">GitHub</a>
                    <a href="https://hackerrank.com/AryanSrivastava" target="_blank" class="glass" style="flex:1;padding:1rem;text-align:center;text-decoration:none;color:var(--accent);font-size:0.85rem;font-weight:600;">HackerRank</a>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="glass reveal" data-tilt style="padding:2rem;">
                <h2 style="font-family:var(--font-display);font-size:1.25rem;font-weight:600;margin-bottom:1.5rem;">Send a Message</h2>
                <form id="contact-form" style="display:flex;flex-direction:column;gap:1.25rem;">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" placeholder="John Doe" required/>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="john@example.com" required/>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" placeholder="Tell me about your project or opportunity..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
                        Send Message
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer" id="main-footer"></footer>
    <script src="scripts/shared.js"></script>
    <script>
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const orig = btn.innerHTML;
            btn.innerHTML = '<span style="display:inline-flex;align-items:center;gap:0.5rem;">Sending...</span>';
            btn.disabled = true;
            btn.style.opacity = '0.7';

            setTimeout(() => {
                btn.innerHTML = '<span style="display:inline-flex;align-items:center;gap:0.5rem;">✓ Message Sent!</span>';
                btn.style.background = 'linear-gradient(135deg, #10b981, #06b6d4)';
                btn.style.opacity = '1';
                this.reset();
                setTimeout(() => {
                    btn.innerHTML = orig;
                    btn.style.background = '';
                    btn.disabled = false;
                }, 3000);
            }, 1500);
        });
    </script>
    <style>
        @media (max-width: 768px) {
            main > div:last-of-type { grid-template-columns: 1fr !important; }
        }
    </style>
</body>
</html>
